services:
  - type: web
    name: sudokofest-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:api
    envVars:
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MEASUREMENT_ID
        sync: false
      - key: FIREBASE_DATABASE_PATH
        sync: false
      - key: X_MASTER_KEY
        sync: false

  - type: static
    name: sudokofest-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist/sudokofest/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
